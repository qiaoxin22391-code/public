<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气预报</title>
  <style>
    /* ========== 基础重置 ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transition: background 1s ease;
      padding: 20px;
    }

    /* ========== 主卡片 ========== */
    .container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      color: #fff;
    }

    /* ========== 头部 ========== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
    }

    #locateBtn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s;
      color: #fff;
    }

    #locateBtn:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    /* ========== 搜索框 ========== */
    .search {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    #cityInput {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.3s;
    }

    #cityInput::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    #cityInput:focus {
      border-color: rgba(255, 255, 255, 0.7);
    }

    #searchBtn {
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.25);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.3s;
    }

    #searchBtn:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    /* ========== 当前天气 ========== */
    .weather-now {
      text-align: center;
      margin-bottom: 24px;
    }

    .weather-icon {
      font-size: 72px;
      margin-bottom: 4px;
    }

    .temp {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.1;
    }

    .desc {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 2px;
    }

    .city {
      font-size: 16px;
      opacity: 0.7;
      margin-bottom: 12px;
    }

    .details {
      display: flex;
      justify-content: center;
      gap: 18px;
      font-size: 13px;
      opacity: 0.8;
      flex-wrap: wrap;
    }

    .details strong {
      font-weight: 600;
    }

    /* ========== 预报卡片组 ========== */
    .forecast {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .forecast-card {
      flex: 1;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 14px 8px;
      text-align: center;
      transition: background 0.3s;
    }

    .forecast-card:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .day-name {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 6px;
    }

    .day-icon {
      font-size: 32px;
      margin-bottom: 6px;
    }

    .day-temp {
      font-size: 14px;
    }

    .day-temp .high {
      font-weight: 600;
    }

    .day-temp .low {
      opacity: 0.6;
      margin-left: 4px;
    }

    /* ========== 消息提示 ========== */
    .message {
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
      min-height: 20px;
    }

    /* ========== 响应式：手机端适配 ========== */
    @media (max-width: 480px) {
      .container {
        padding: 20px;
        border-radius: 16px;
      }

      .temp {
        font-size: 44px;
      }

      .weather-icon {
        font-size: 56px;
      }

      .details {
        gap: 10px;
        font-size: 12px;
      }

      .forecast {
        gap: 6px;
      }

      .forecast-card {
        padding: 10px 4px;
      }
    }
  </style>
</head>
<body>
  <!-- 主容器 -->
  <div class="container">
    <!-- 顶部标题 -->
    <div class="header">
      <h1>🌤️ 天气预报</h1>
      <button id="locateBtn" title="定位到当前城市">📍</button>
    </div>

    <!-- 搜索区域 -->
    <div class="search">
      <input type="text" id="cityInput" placeholder="输入城市名...">
      <button id="searchBtn">搜索</button>
    </div>

    <!-- 当前天气 -->
    <div class="weather-now" id="weatherNow">
      <div class="weather-icon" id="weatherIcon">☀️</div>
      <div class="temp" id="temp">--°C</div>
      <div class="desc" id="desc">--</div>
      <div class="city" id="city">--</div>
      <div class="details">
        <span>💧 湿度 <strong id="humidity">--</strong>%</span>
        <span>🌬️ 风速 <strong id="wind">--</strong> km/h</span>
        <span>🌡️ 体感 <strong id="feelsLike">--</strong>°C</span>
      </div>
    </div>

    <!-- 三天预报 -->
    <div class="forecast" id="forecast">
      <div class="forecast-card" id="day1">
        <div class="day-name">明天</div>
        <div class="day-icon">⛅</div>
        <div class="day-temp"><span class="high">--°</span> <span class="low">--°</span></div>
      </div>
      <div class="forecast-card" id="day2">
        <div class="day-name">后天</div>
        <div class="day-icon">⛅</div>
        <div class="day-temp"><span class="high">--°</span> <span class="low">--°</span></div>
      </div>
      <div class="forecast-card" id="day3">
        <div class="day-name">第三天</div>
        <div class="day-icon">⛅</div>
        <div class="day-temp"><span class="high">--°</span> <span class="low">--°</span></div>
      </div>
    </div>

    <!-- 消息提示 -->
    <div class="message" id="message"></div>
  </div>

  <!-- ==================== JavaScript ==================== -->
  <script>
    // ========== 天气代码 → Emoji 图标映射 ==========
    var weatherIcons = {
      "113": "☀️",
      "116": "⛅",
      "119": "☁️",
      "122": "☁️",
      "143": "🌫️",
      "176": "🌦️",
      "179": "🌨️",
      "182": "🌧️",
      "185": "🌧️",
      "200": "⛈️",
      "227": "🌨️",
      "230": "🌨️",
      "248": "🌫️",
      "260": "🌫️",
      "263": "🌦️",
      "266": "🌧️",
      "281": "🌧️",
      "284": "🌧️",
      "293": "🌧️",
      "296": "🌧️",
      "299": "🌧️",
      "302": "🌧️",
      "305": "🌧️",
      "308": "🌧️",
      "311": "🌧️",
      "314": "🌧️",
      "317": "🌧️",
      "320": "🌨️",
      "323": "🌨️",
      "326": "🌨️",
      "329": "❄️",
      "332": "❄️",
      "335": "❄️",
      "338": "❄️",
      "350": "🌨️",
      "353": "🌦️",
      "356": "🌧️",
      "359": "🌧️",
      "362": "🌧️",
      "365": "🌧️",
      "368": "🌨️",
      "371": "❄️",
      "374": "🌧️",
      "377": "🌧️",
      "386": "⛈️",
      "389": "⛈️",
      "392": "⛈️",
      "395": "❄️"
    };

    function getWeatherIcon(code) {
      return weatherIcons[code] || "🌈";
    }

    function updateBackground(weatherCode) {
      var body = document.body;

      if (weatherCode === "113") {
        body.style.background = "linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #ffa751 100%)";
      }
      else if (["116", "119", "122"].indexOf(weatherCode) !== -1) {
        body.style.background = "linear-gradient(135deg, #667eea 0%, #5a6fb0 50%, #4a5a90 100%)";
      }
      else if (["176", "200", "263", "266", "293", "296", "299", "302",
                 "305", "308", "311", "314", "353", "356", "359", "386", "389"].indexOf(weatherCode) !== -1) {
        body.style.background = "linear-gradient(135deg, #2c3e50 0%, #3498db 50%, #5f6c7d 100%)";
      }
      else if (["179", "182", "185", "227", "230", "320", "323", "326",
                 "329", "332", "335", "338", "350", "368", "371", "392", "395"].indexOf(weatherCode) !== -1) {
        body.style.background = "linear-gradient(135deg, #e0eafc 0%, #cfdef3 50%, #a1c4fd 100%)";
      }
      else {
        body.style.background = "linear-gradient(135deg, #667eea 0%, #764ba2 100%)";
      }
    }

    function showMessage(text) {
      document.getElementById("message").textContent = text;
    }

    function getWeatherFromHourly(hourlyData) {
      if (!hourlyData || hourlyData.length === 0) return null;
      var mid = Math.floor(hourlyData.length / 2);
      return hourlyData[mid];
    }

    function formatDate(dateStr) {
      var d = new Date(dateStr);
      return (d.getMonth() + 1) + "月" + d.getDate() + "日";
    }

    async function fetchWeatherByCity(city) {
      showMessage("加载中...");
      try {
        var url = "https://wttr.in/" + encodeURIComponent(city) + "?format=j1";
        var response = await fetch(url);

        if (!response.ok) {
          throw new Error("城市不存在");
        }

        var data = await response.json();

        if (!data.current_condition || data.current_condition.length === 0) {
          throw new Error("找不到该城市");
        }

        showMessage("");
        return data;
      } catch (error) {
        if (error.message === "找不到该城市" || error.message === "城市不存在") {
          showMessage("找不到该城市，请检查输入 🤔");
        } else {
          showMessage("网络出小差了，请稍后重试 🌐");
        }
        return null;
      }
    }

    async function fetchWeatherByCoords(lat, lon) {
      showMessage("定位中...");
      try {
        var url = "https://wttr.in/?format=j1&lat=" + lat + "&lon=" + lon;
        var response = await fetch(url);
        if (!response.ok) throw new Error("请求失败");
        var data = await response.json();
        showMessage("");
        return data;
      } catch (error) {
        showMessage("网络出小差了，请稍后重试 🌐");
        return null;
      }
    }

    function renderCurrentWeather(data) {
      var current = data.current_condition[0];

      document.getElementById("weatherIcon").textContent = getWeatherIcon(current.weatherCode);
      document.getElementById("temp").textContent = current.temp_C + "°C";
      document.getElementById("desc").textContent = current.weatherDesc[0].value;

      var nearest = data.nearest_area[0];
      var cityName = nearest.areaName[0].value;
      if (nearest.region[0].value) {
        cityName = cityName + ", " + nearest.region[0].value;
      }
      document.getElementById("city").textContent = cityName;

      document.getElementById("humidity").textContent = current.humidity;
      document.getElementById("wind").textContent = current.windspeedKmph;
      document.getElementById("feelsLike").textContent = current.FeelsLikeC;

      updateBackground(current.weatherCode);
    }

    function renderForecast(data) {
      var weatherDays = data.weather;
      var weekDays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];

      for (var i = 0; i < 3; i++) {
        var dayData = weatherDays[i + 1];
        if (!dayData) continue;

        var dayEl = document.getElementById("day" + (i + 1));
        if (!dayEl) continue;

        var nameMap = ["明天", "后天"];
        var dateObj = new Date(dayData.date);
        var label = (nameMap[i] || weekDays[dateObj.getDay()]) + " " + formatDate(dayData.date);
        dayEl.querySelector(".day-name").textContent = label;

        var midWeather = getWeatherFromHourly(dayData.hourly);
        var iconCode = midWeather ? midWeather.weatherCode : "113";
        dayEl.querySelector(".day-icon").textContent = getWeatherIcon(iconCode);

        dayEl.querySelector(".high").textContent = dayData.maxtempC + "°";
        dayEl.querySelector(".low").textContent = dayData.mintempC + "°";
      }
    }

    function renderAll(data) {
      renderCurrentWeather(data);
      renderForecast(data);
    }

    async function doSearch() {
      var city = document.getElementById("cityInput").value.trim();
      if (!city) {
        showMessage("请输入城市名");
        return;
      }
      var data = await fetchWeatherByCity(city);
      if (data) {
        renderAll(data);
      }
    }

    document.getElementById("searchBtn").addEventListener("click", doSearch);

    document.getElementById("cityInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        doSearch();
      }
    });

    document.getElementById("locateBtn").addEventListener("click", function() {
      if (!navigator.geolocation) {
        showMessage("您的浏览器不支持定位功能");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async function(position) {
          var lat = position.coords.latitude.toFixed(2);
          var lon = position.coords.longitude.toFixed(2);
          var data = await fetchWeatherByCoords(lat, lon);
          if (data) {
            renderAll(data);
            var nearest = data.nearest_area[0];
            document.getElementById("cityInput").value = nearest.areaName[0].value;
          }
        },
        function() {
          showMessage("定位失败，将显示默认城市（北京）");
          fetchWeatherByCity("Beijing").then(function(data) {
            if (data) renderAll(data);
          });
        },
        { timeout: 10000 }
      );
    });

    window.addEventListener("load", function() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          async function(position) {
            var lat = position.coords.latitude.toFixed(2);
            var lon = position.coords.longitude.toFixed(2);
            var data = await fetchWeatherByCoords(lat, lon);
            if (data) {
              renderAll(data);
              var nearest = data.nearest_area[0];
              document.getElementById("cityInput").value = nearest.areaName[0].value;
            }
          },
          async function() {
            var data = await fetchWeatherByCity("Beijing");
            if (data) renderAll(data);
          }
        );
      } else {
        document.getElementById("locateBtn").style.display = "none";
        fetchWeatherByCity("Beijing").then(function(data) {
          if (data) renderAll(data);
        });
      }
    });
  </script>
</body>
</html>
