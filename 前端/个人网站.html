<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网页</title>
    <style>
        /* ========== 页面基础 ========== */
        body {
            background: #0a0a1a;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ========== TODO 大盒子 ========== */
        .todo {
            position: relative;
            z-index: 1;
            width: 420px;
            min-height: 560px;
            max-height: 720px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin: 80px auto;
            padding: 28px 0 20px 0;
            box-sizing: border-box;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.35),
                0 0 120px rgba(100, 160, 255, 0.06);
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .todo-title {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 18px;
            background: linear-gradient(135deg, #667eea, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        /* ========== 输入区 ========== */
        .go {
            display: flex;
            padding: 0 24px;
            margin-bottom: 4px;
        }
        .go-input {
            flex: 1;
            height: 44px;
            border: 2px solid #e8ecf1;
            border-right: none;
            border-radius: 22px 0 0 22px;
            padding: 0 18px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
        }
        .go-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
        }
        .go-input::placeholder {
            color: #c0c8d0;
        }

        .add {
            width: 64px;
            height: 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 0 22px 22px 0;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            transition: opacity 0.2s, transform 0.1s;
        }
        .add:hover {
            opacity: 0.9;
        }
        .add:active {
            transform: scale(0.94);
        }

        /* ========== 事项列表容器 ========== */
        #todoList {
            flex: 1;
            overflow-y: auto;
            padding: 6px 24px 0;
        }
        #todoList::-webkit-scrollbar {
            width: 5px;
        }
        #todoList::-webkit-scrollbar-thumb {
            background: #d4d9e0;
            border-radius: 10px;
        }

        /* ========== 每条事项 ========== */
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fb;
            padding: 12px 16px;
            margin: 6px 0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: normal;
            text-align: left;
            border-left: 3px solid #667eea;
            transition: all 0.2s ease;
            animation: slideIn 0.3s ease;
        }
        .item:hover {
            background: #eef2ff;
            transform: translateX(3px);
            box-shadow: 0 2px 12px rgba(102, 126, 234, 0.1);
        }

        .item-text {
            cursor: pointer;
            flex: 1;
            word-break: break-all;
        }

        .item-done {
            text-decoration: line-through;
            color: #b0b8c0;
        }

        .item-del {
            color: #c0c8d0;
            cursor: pointer;
            font-size: 13px;
            margin-left: 12px;
            padding: 3px 7px;
            border-radius: 50%;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .item-del:hover {
            color: #ff4757;
            background: #ffe0e3;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .todo {
                width: 92%;
                margin: 20px auto;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="todo">
        <div class="todo-title">📋 To Do</div>
        <div class="go">
            <input class="go-input" type="text" placeholder="写点什么...">
            <div class="add" onclick="add()">添加</div>
        </div>
        <div id="todoList"></div>
    </div>

    <script src="个人网站.js"></script>
</body>
</html>
